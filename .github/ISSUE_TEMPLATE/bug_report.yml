name: Bug 报告
description: 报告游戏中的 bug
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug 描述
        请简要描述您发现的 bug。

  - type: textarea
    id: description
    attributes:
      label: Bug 详细描述
      placeholder: 请详细描述您遇到的问题...
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      options:
        - Android
        - iOS
        - Web (浏览器)
        - 其他
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入...
        2. 点击...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      placeholder: 您期望的行为是什么？

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 实际发生了什么？

  - type: textarea
    id: screenshots
    attributes:
      label: 截图/录屏
      placeholder: 如果有截图或录屏，请描述或附加

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      placeholder: |
        - 操作系统版本：
        - 浏览器版本（如适用）：
        - 应用版本：
